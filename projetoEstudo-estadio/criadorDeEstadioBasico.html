<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criador de Estádio</title>
<style>
  * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
  body { margin: 0; display: flex; height: 100vh; background: #eee; }

  /* ===== PAINEL LATERAL ===== */
  #painel {
    width: 300px;
    background: #fff;
    border-right: 2px solid #999;
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #painel h2 { font-size: 15px; margin: 14px 0 6px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  #painel label { display: block; font-size: 12px; margin-top: 6px; }
  #painel input, #painel select {
    width: 100%; padding: 5px; margin-top: 2px; border: 1px solid #999; font-size: 12px;
  }
  #painel button {
    width: 100%; margin-top: 10px; padding: 8px; background: #333; color: #fff;
    border: none; cursor: pointer; font-size: 13px;
  }
  #painel button:hover { background: #555; }
  #lista-setores { font-size: 12px; margin-top: 8px; }
  .item-setor {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px; border: 1px solid #ccc; margin-bottom: 4px; cursor: pointer;
  }
  .item-setor:hover { background: #f0f0f0; }
  .swatch { width: 14px; height: 14px; display: inline-block; margin-right: 6px; border: 1px solid #000; }
  .btn-del { background: #a33; color: #fff; border: none; padding: 2px 6px; cursor: pointer; font-size: 11px; }

  /* ===== AREA PRINCIPAL ===== */
  #area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow: auto;
  }
  #estadio-nome { font-size: 18px; margin-bottom: 10px; }

  #campo-wrap {
    position: relative;
    width: 700px;
    height: 700px;
    margin: 0 auto;
    background: #fafafa;
    border: 2px dashed #aaa;
  }
  #campo {
    position: absolute;
    top: 260px; left: 220px;
    width: 260px; height: 180px;
    background: #7ab77a;
    border: 2px solid #4a884a;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: bold;
  }
  .setor-box {
    position: absolute;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold; color: #fff;
    cursor: pointer;
    text-shadow: 0 0 3px rgba(0,0,0,.6);
  }
  .setor-box:hover { outline: 3px solid #000; }

  /* ===== GRADE DE ASSENTOS ===== */
  #modal-assentos {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5);
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #modal-conteudo {
    background: #fff; padding: 16px; max-width: 90vw; max-height: 90vh; overflow: auto;
  }
  #modal-conteudo h3 { margin-top: 0; }
  .fileira { display: flex; align-items: center; margin-bottom: 3px; }
  .fileira-label { width: 24px; font-size: 11px; text-align: right; margin-right: 6px; }
  .assento {
    width: 22px; height: 22px; margin-right: 3px;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    border: 1px solid #555; cursor: pointer; color: #fff;
  }
  .st-DISPONIVEL { background: #4caf50; }
  .st-RESERVADO { background: #ff9800; }
  .st-VENDIDO { background: #e53935; }
  .st-CANCELADO { background: #9e9e9e; }
  .st-UTILIZADO { background: #3f51b5; }
  #legenda { font-size: 11px; margin-top: 10px; }
  #legenda span { display: inline-flex; align-items: center; margin-right: 10px; }
  #legenda .swatch { width: 12px; height: 12px; margin-right: 4px; border: 1px solid #555; }
  #fechar-modal { margin-top: 12px; padding: 6px 12px; cursor: pointer; }
</style>
</head>
<body>

<div id="painel">
  <h2>Estádio</h2>
  <label>Descrição
    <input id="in-estadio-desc" placeholder="Ex: Arena da Baixada">
  </label>
  <label>Cidade
    <input id="in-estadio-cidade" placeholder="Ex: Curitiba">
  </label>
  <label>Endereço
    <input id="in-estadio-endereco" placeholder="Ex: Rua...">
  </label>
  <button onclick="salvarEstadio()">Salvar dados do estádio</button>

  <h2>Novo Setor</h2>
  <label>Descrição do setor
    <input id="in-setor-desc" placeholder="Ex: Setor Norte">
  </label>
  <label>Cor
    <input id="in-setor-cor" type="color" value="#2196f3">
  </label>
  <label>Posição ao redor do campo
    <select id="in-setor-posicao">
      <option value="cima">Cima (Norte)</option>
      <option value="baixo">Baixo (Sul)</option>
      <option value="esquerda">Esquerda (Leste)</option>
      <option value="direita">Direita (Oeste)</option>
    </select>
  </label>
  <label>Nº de fileiras
    <input id="in-setor-fileiras" type="number" value="4" min="1" max="26">
  </label>
  <label>Assentos por fileira
    <input id="in-setor-assentos" type="number" value="10" min="1" max="60">
  </label>
  <button onclick="criarSetor()">Adicionar setor</button>

  <h2>Setores criados</h2>
  <div id="lista-setores"></div>

  <h2>Exportar</h2>
  <button onclick="exportarJSON()">Baixar JSON (estrutura do banco)</button>
</div>

<div id="area">
  <div id="estadio-nome">Novo Estádio (preencha os dados ao lado)</div>
  <div id="campo-wrap">
    <div id="campo">CAMPO</div>
  </div>
</div>

<div id="modal-assentos">
  <div id="modal-conteudo">
    <h3 id="modal-titulo"></h3>
    <div id="grade-assentos"></div>
    <div id="legenda">
      <span><span class="swatch" style="background:#4caf50"></span>Disponível</span>
      <span><span class="swatch" style="background:#ff9800"></span>Reservado</span>
      <span><span class="swatch" style="background:#e53935"></span>Vendido</span>
      <span><span class="swatch" style="background:#9e9e9e"></span>Cancelado</span>
      <span><span class="swatch" style="background:#3f51b5"></span>Utilizado</span>
    </div>
    <p style="font-size:11px;color:#666">Clique num assento para alternar o status (apenas simulação visual).</p>
    <button id="fechar-modal" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
// ===================== ESTADO (simula o banco) =====================
let estadio = {
  cod_estadio: 1,
  desc_estadio: "",
  cidade: "",
  endereco: ""
};

let setores = [];      // { cod_setor, cod_estadio, desc_setor, cor_setor, capacidade, posicao, fileiras, assentosPorFileira }
let assentos = [];      // { cod_assento, cod_setor, fila, numero, status }

let seqSetor = 1;
let seqAssento = 1;

// contadores de quantos setores já existem em cada posição, pra empilhar sem sobrepor
const posicaoCount = { cima: 0, baixo: 0, esquerda: 0, direita: 0 };

function salvarEstadio() {
  estadio.desc_estadio = document.getElementById('in-estadio-desc').value || "Estádio sem nome";
  estadio.cidade = document.getElementById('in-estadio-cidade').value;
  estadio.endereco = document.getElementById('in-estadio-endereco').value;
  document.getElementById('estadio-nome').textContent =
    estadio.desc_estadio + (estadio.cidade ? " — " + estadio.cidade : "");
}

function criarSetor() {
  const desc = document.getElementById('in-setor-desc').value || ("Setor " + (setores.length + 1));
  const cor = document.getElementById('in-setor-cor').value;
  const posicao = document.getElementById('in-setor-posicao').value;
  const fileiras = parseInt(document.getElementById('in-setor-fileiras').value) || 1;
  const assentosPorFileira = parseInt(document.getElementById('in-setor-assentos').value) || 1;
  const capacidade = fileiras * assentosPorFileira;

  const setor = {
    cod_setor: seqSetor++,
    cod_estadio: estadio.cod_estadio,
    desc_setor: desc,
    cor_setor: cor,
    capacidade: capacidade,
    posicao: posicao,
    fileiras: fileiras,
    assentosPorFileira: assentosPorFileira
  };
  setores.push(setor);

  // gera os assentos desse setor (fileira A, B, C... e numero 1..N)
  for (let f = 0; f < fileiras; f++) {
    const letraFileira = String.fromCharCode(65 + f); // A, B, C...
    for (let n = 1; n <= assentosPorFileira; n++) {
      assentos.push({
        cod_assento: seqAssento++,
        cod_setor: setor.cod_setor,
        fila: letraFileira,
        numero: n,
        status: "DISPONIVEL"
      });
    }
  }

  renderTudo();
  document.getElementById('in-setor-desc').value = "";
}

function removerSetor(codSetor) {
  setores = setores.filter(s => s.cod_setor !== codSetor);
  assentos = assentos.filter(a => a.cod_setor !== codSetor);
  renderTudo();
}

function renderTudo() {
  renderListaSetores();
  renderCampo();
}

function renderListaSetores() {
  const lista = document.getElementById('lista-setores');
  lista.innerHTML = "";
  setores.forEach(s => {
    const div = document.createElement('div');
    div.className = "item-setor";
    div.innerHTML = `
      <span onclick="abrirAssentos(${s.cod_setor})">
        <span class="swatch" style="background:${s.cor_setor}"></span>
        ${s.desc_setor} (${s.capacidade} lugares)
      </span>
      <button class="btn-del" onclick="removerSetor(${s.cod_setor})">x</button>
    `;
    lista.appendChild(div);
  });
}

function renderCampo() {
  const wrap = document.getElementById('campo-wrap');
  // remove setores antigos (mantém #campo)
  wrap.querySelectorAll('.setor-box').forEach(el => el.remove());

  // reset contadores
  posicaoCount.cima = 0; posicaoCount.baixo = 0; posicaoCount.esquerda = 0; posicaoCount.direita = 0;

  setores.forEach(s => {
    const box = document.createElement('div');
    box.className = "setor-box";
    box.style.background = s.cor_setor;
    box.textContent = s.desc_setor;
    box.onclick = () => abrirAssentos(s.cod_setor);

    const idx = posicaoCount[s.posicao]++;
    posicionarSetor(box, s.posicao, idx);

    wrap.appendChild(box);
  });
}

// posiciona o setor "empilhado" em camadas ao redor do campo, conforme a posição escolhida
function posicionarSetor(box, posicao, idx) {
  const espessura = 70; // espessura de cada camada de setor
  const margem = idx * espessura;

  if (posicao === "cima") {
    box.style.top = (10 + margem) + "px";
    box.style.left = "10px";
    box.style.width = "680px";
    box.style.height = espessura - 8 + "px";
  } else if (posicao === "baixo") {
    box.style.bottom = (10 + margem) + "px";
    box.style.left = "10px";
    box.style.width = "680px";
    box.style.height = espessura - 8 + "px";
    box.style.top = "auto";
  } else if (posicao === "esquerda") {
    box.style.left = (10 + margem) + "px";
    box.style.top = "180px";
    box.style.width = espessura - 8 + "px";
    box.style.height = "340px";
  } else if (posicao === "direita") {
    box.style.right = (10 + margem) + "px";
    box.style.top = "180px";
    box.style.width = espessura - 8 + "px";
    box.style.height = "340px";
    box.style.left = "auto";
  }
}

// ===================== MODAL DE ASSENTOS =====================
function abrirAssentos(codSetor) {
  const setor = setores.find(s => s.cod_setor === codSetor);
  const meusAssentos = assentos.filter(a => a.cod_setor === codSetor);

  document.getElementById('modal-titulo').textContent =
    setor.desc_setor + " — " + setor.capacidade + " assentos";

  const grade = document.getElementById('grade-assentos');
  grade.innerHTML = "";

  // agrupa por fileira
  const porFileira = {};
  meusAssentos.forEach(a => {
    if (!porFileira[a.fila]) porFileira[a.fila] = [];
    porFileira[a.fila].push(a);
  });

  Object.keys(porFileira).sort().forEach(fila => {
    const linha = document.createElement('div');
    linha.className = "fileira";

    const label = document.createElement('div');
    label.className = "fileira-label";
    label.textContent = fila;
    linha.appendChild(label);

    porFileira[fila].sort((a,b) => a.numero - b.numero).forEach(assento => {
      const box = document.createElement('div');
      box.className = "assento st-" + assento.status;
      box.textContent = assento.numero;
      box.title = "Fileira " + assento.fila + " - Assento " + assento.numero + " (" + assento.status + ")";
      box.onclick = () => alternarStatus(assento);
      linha.appendChild(box);
    });

    grade.appendChild(linha);
  });

  document.getElementById('modal-assentos').style.display = "flex";
}

const ordemStatus = ["DISPONIVEL", "RESERVADO", "VENDIDO", "CANCELADO", "UTILIZADO"];
function alternarStatus(assento) {
  const i = ordemStatus.indexOf(assento.status);
  assento.status = ordemStatus[(i + 1) % ordemStatus.length];
  // re-renderiza a grade do setor atual
  abrirAssentos(assento.cod_setor);
}

function fecharModal() {
  document.getElementById('modal-assentos').style.display = "none";
}

// ===================== EXPORTAR JSON (formato do banco) =====================
function exportarJSON() {
  const dados = {
    estadio: estadio,
    setores: setores.map(s => ({
      cod_setor: s.cod_setor,
      cod_estadio: s.cod_estadio,
      desc_setor: s.desc_setor,
      cor_setor: s.cor_setor,
      capacidade: s.capacidade
    })),
    assentos: assentos.map(a => ({
      cod_assento: a.cod_assento,
      cod_setor: a.cod_setor,
      fila: a.fila,
      numero: a.numero
    }))
  };

  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "estadio_export.json";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
